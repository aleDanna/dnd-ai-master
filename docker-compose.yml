# Local Postgres for development. Major version matches the project's Neon instance.
# Use `pnpm db:up` / `pnpm db:down`; data persists in the `pgdata` volume.

# Explicit project name so every worktree shares the same volume + container
# (without `name:`, Compose defaults to the directory name → each worktree
# would get its own empty pgdata). With `name`, all worktrees see the same
# Bruce Kettah, same migrations, same RAG index.
name: dnd-ai-master

services:
  postgres:
    # pgvector/pgvector:pg17 = official Postgres 17 base + pgvector extension
    # pre-installed and pre-loaded. Drop-in replacement for postgres:17; the
    # pgdata volume is reused, no data loss. Needed by Plan E.2 (RAG).
    image: pgvector/pgvector:pg17
    container_name: dnd-ai-postgres
    restart: unless-stopped
    # Host port 5433 to avoid colliding with any other Postgres already on 5432.
    # Connect from the host with: postgresql://postgres:postgres@localhost:5433/dnd_ai
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dnd_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dnd_ai"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
